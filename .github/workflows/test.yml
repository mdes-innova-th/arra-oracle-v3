name: Test

on:
  pull_request:
    branches: [alpha]

jobs:
  test:
    name: Typecheck and scoped tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          tsc --noEmit

      - name: Run scoped unit tests
        run: >
          bun test --isolate
          src/tools/__tests__/
          src/server/__tests__/
          tests/storage/
          tests/http/swagger/
          src/vault/__tests__/
          src/indexer/__tests__/
          src/drizzle-migration.test.ts
          src/indexer-preservation.test.ts

      - name: Run scoped integration tests
        run: bun test --isolate src/integration/
