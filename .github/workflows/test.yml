name: Test

on:
  pull_request:
    branches: [alpha]

jobs:
  test:
    name: Typecheck and scoped tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache bun deps
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ hashFiles('bun.lock') }}
          restore-keys: bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: |
          export PATH="$PWD/node_modules/.bin:$PATH"
          tsc --noEmit

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Check Tauri shell
        run: cd frontend/src-tauri && cargo check

      - name: Run scoped unit tests
        run: >
          bun test --isolate
          src/tools/__tests__/
          src/server/__tests__/
          tests/storage/
          tests/http/swagger/
          tests/http/health/
          tests/lifecycle/
          tests/plugins/
          src/vault/__tests__/
          src/indexer/__tests__/
          src/drizzle-migration.test.ts
          src/indexer-preservation.test.ts

      - name: Run scoped integration tests
        run: bun test --isolate src/integration/

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/src-tauri/target
          key: rust-${{ hashFiles('frontend/src-tauri/Cargo.lock') }}
          restore-keys: rust-

      - name: Cargo check (Tauri)
        run: cd frontend/src-tauri && cargo check
