name: CalVer Release

# Unified tag + build + release pipeline for CalVer versions on arra-oracle-v3.
#
# Ported from: Soul-Brews-Studio/maw-js .github/workflows/calver-release.yml
# Replaces:    auto-tag.yml (no calver/prerelease handling) + release.yml
#              (separate tag-trigger job — produced cascade gap).
#
# Triggered when package.json is modified on main or alpha. All steps run
# in ONE job so there is no workflow-cascade gap (GITHUB_TOKEN-created
# tags/releases deliberately don't trigger downstream workflows; doing it
# inline sidesteps that rule entirely).
#
# Branch ↔ channel mapping:
#   - main  → stable cut       → tag vX.Y.Z          (marked latest)
#   - alpha → pre-release cut  → tag vX.Y.Z-alpha.N  (prerelease=true,
#                                                     NOT marked latest)
# The prerelease flag is derived from the version string (-alpha./-beta.
# suffix) — branch is just the trigger; version is the source of truth.
# Concurrency group `calver-release` serializes simultaneous main+alpha
# pushes so two runs cannot race on tag creation.
#
# arra-oracle-v3 is github-only (no npm publish). Install flow is
# `bun add -g github:Soul-Brews-Studio/arra-oracle-v3#vX.Y.Z`. This
# workflow only creates the tag + GH release notes (no binary artifact —
# arra's build is `tsc --noEmit`, type-check only).

on:
  push:
    branches: [main, alpha]
    paths:
      - package.json

permissions:
  contents: write

concurrency:
  group: calver-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          # Match the rest of arra's CI (test.yml, the existing release.yml
          # we're superseding) which both use `latest`.
          bun-version: latest

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Read + validate version
        id: ver
        run: |
          set -e
          VERSION=$(jq -r '.version' package.json)
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          # Only act on CalVer-shaped versions. Legacy semver bumps are
          # skipped as no-op during the transition period.
          # Accepts alpha and beta channels; both are prereleases.
          # Suffix is HMM: integer H*100+M, 1-4 digits, no leading zero
          # (e.g. 5, 30, 929, 1200, 2359). Optional trailing lowercase letter
          # remains the same-minute collision suffix.
          REGEX='^[0-9]{2}\.[0-9]{1,2}\.[0-9]{1,3}(-(alpha|beta)\.[0-9]{1,4}[a-z]?)?$'
          if [[ ! "$VERSION" =~ $REGEX ]]; then
            echo "::notice title=Skipped::Version '$VERSION' is not CalVer — no release cut."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Range validation — regex alone passes month.99.
          BASE="${VERSION%%-*}"
          IFS='.' read -r YY M D <<< "$BASE"
          if (( M < 1 || M > 12 )); then
            echo "::error::Month must be 1-12, got $M"; exit 1
          fi
          # The third number is a monotonic counter that floors at the
          # day-of-month and increments on every cut, so values can legitimately
          # exceed 31 after a day-rollover streak (yesterday cut .31, today
          # cuts continue .32, .33, …). Floor-only validation; the calver
          # script (scripts/calver.ts) is the source of truth for ordering.
          if (( D < 1 )); then
            echo "::error::Day/counter must be ≥1, got $D"; exit 1
          fi
          PRERELEASE="false"
          CHANNEL="stable"
          if [[ "$VERSION" == *-alpha.* ]]; then
            PRERELEASE="true"
            CHANNEL="alpha"
          elif [[ "$VERSION" == *-beta.* ]]; then
            PRERELEASE="true"
            CHANNEL="beta"
          fi
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "✅ valid CalVer: $TAG (channel=$CHANNEL prerelease=$PRERELEASE)"

      - name: Check tag collision or unchanged-version no-op
        id: tagcheck
        if: steps.ver.outputs.skip != 'true'
        run: |
          set -e
          VERSION="${{ steps.ver.outputs.version }}"
          TAG="${{ steps.ver.outputs.tag }}"
          BEFORE="${{ github.event.before }}"
          if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
            BEFORE="HEAD^"
          fi
          PREVIOUS_VERSION="$(git show "$BEFORE:package.json" 2>/dev/null | jq -r '.version // empty' || true)"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [[ "$PREVIOUS_VERSION" == "$VERSION" ]]; then
              echo "::notice title=Skipped::Tag $TAG already exists and package version did not change ($VERSION); no release cut for this package.json feature merge."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "::error title=Tag collision::$TAG already exists, but package version changed from '$PREVIOUS_VERSION' to '$VERSION'. Use the same-minute collision suffix (alpha.Nb) or wait for the next minute."
            exit 1
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "✓ $TAG is free"

      - name: Install + test + build
        if: steps.ver.outputs.skip != 'true' && steps.tagcheck.outputs.skip != 'true'
        run: |
          bun install --frozen-lockfile
          bun run test
          bun run build

      - name: Tag + GitHub release
        if: steps.ver.outputs.skip != 'true' && steps.tagcheck.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

          FLAGS="--generate-notes --title $TAG"
          if [[ "${{ steps.ver.outputs.prerelease }}" == "true" ]]; then
            FLAGS="$FLAGS --prerelease"
          fi
          gh release create "$TAG" $FLAGS

      - name: Summary
        if: steps.ver.outputs.skip != 'true' && steps.tagcheck.outputs.skip != 'true'
        run: |
          TAG="${{ steps.ver.outputs.tag }}"
          echo "### 🎉 Released $TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Channel:** ${{ steps.ver.outputs.channel }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Release:** https://github.com/${{ github.repository }}/releases/tag/$TAG" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Install:** \`bun add -g github:${{ github.repository }}#$TAG\`" >> "$GITHUB_STEP_SUMMARY"
